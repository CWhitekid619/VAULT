        if (reqId !== detailReqId) return;
        detailBody.innerHTML = '<div class="detail-error">Konnte nicht geladen werden.</div>';
      }
    }

    function renderPerson(data) {
      // merge acting + crew credits, dedupe by media, keep movies/tv with a poster
      const cc = data.combined_credits || {};
      const seen = {};
      const credits = [];
      [...(cc.cast || []), ...(cc.crew || [])].forEach(c => {
        if (c.media_type !== "movie" && c.media_type !== "tv") return;
        const k = c.media_type + ":" + c.id;
        if (seen[k]) return;
        seen[k] = true;
        credits.push(c);
      });
      credits.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
      const shown = credits.slice(0, 40);

      let html = '<div class="person-page">';
      html += '<div class="person-hero">';
      html += data.profile_path
        ? '<img class="person-photo" src="' + IMG_BASE + "w185" + data.profile_path + '" alt="">'
        : '<div class="person-photo"></div>';
      html += '<div class="person-hero-meta"><h2 class="detail-title">' + esc(data.name || "") + "</h2>";
      if (data.known_for_department) html += '<div class="detail-genres">' + esc(data.known_for_department) + "</div>";
      const watchedHere = shown.filter(c => db.items[c.media_type + ":" + c.id]).length;
      html += '<div class="person-stat">' + shown.length + " Titel · " + watchedHere + " gesehen</div>";
      html += "</div></div>";

      if (data.biography) {
        html += '<div class="detail-section"><p class="detail-overview">' + esc(data.biography.slice(0, 400)) + (data.biography.length > 400 ? " …" : "") + "</p></div>";
      }

      html += '<div class="detail-section"><h3>Titel</h3><div class="poster-grid" id="person-grid">';
      html += shown.map(c => {
        const mt = c.media_type;
        const t = mt === "tv" ? (c.name || c.original_name) : (c.title || c.original_title);
        const key = mt + ":" + c.id;
        const logged = db.items[key];
        let badge = "";
        if (logged) badge = '<span class="grid-badge">' + esc(bucketLabel(deriveBucket(ensureScore(logged)))) + "</span>";
        else if (membershipLabel(key)) badge = '<span class="grid-badge ghost">Liste</span>';
        return '<div class="grid-item" data-media="' + mt + '" data-id="' + c.id + '">' +
          (c.poster_path
            ? '<img loading="lazy" src="' + IMG_BASE + "w185" + c.poster_path + '" alt="">'
            : '<div class="gi-empty">' + esc(t || "") + "</div>") +
          badge + "</div>";
      }).join("");
      html += "</div></div></div>";

      detailBody.innerHTML = html;
      detailBody.scrollTop = 0;
      detailEl.scrollTop = 0;

      document.getElementById("person-grid").addEventListener("click", e => {
        const cell = e.target.closest(".grid-item");
        if (cell) openDetail(cell.dataset.media, parseInt(cell.dataset.id, 10));
      });
    }

    // ====================================================================
    //  PER-TITLE META  (note / free tags / rewatch marker)
    // ====================================================================
    function getMeta(key) {
      const m = db.meta[key];
      return { note: (m && m.note) || "", tags: (m && m.tags) || [], rewatch: !!(m && m.rewatch), flagged: !!(m && m.flagged) };
    }
    function saveMeta(key, meta) {
      // drop empty meta to keep storage tidy
      if (!meta.note && (!meta.tags || !meta.tags.length) && !meta.rewatch && !meta.flagged) delete db.meta[key];
      else db.meta[key] = { note: meta.note || "", tags: meta.tags || [], rewatch: !!meta.rewatch, flagged: !!meta.flagged };
      saveDB();
    }

    let personalNoteTimer = null;

    function renderPersonal(mediaType, id) {
      const host = document.getElementById("detail-personal");
      if (!host) return;
      const key = keyOf(mediaType, id);
      const meta = getMeta(key);

      host.innerHTML =
        '<div class="detail-section"><h3>Meine Notizen &amp; Tags</h3>' +
        '<button id="pers-rewatch" class="rewatch-toggle" type="button">' +
          '<span class="ep-check"></span><span>Schon gesehen (Rewatch)</span></button>' +
        '<button id="pers-flag" class="rewatch-toggle" type="button">' +
          '<span class="ep-check"></span><span>Enthält Nacktheit / Sex (selbst markiert)</span></button>' +
        '<div id="pers-tags" class="tag-list"></div>' +
        '<input id="pers-tag-input" class="modal-input" type="text" maxlength="30" ' +
          'placeholder="Tag hinzufügen, Enter" autocomplete="off" />' +
        '<textarea id="pers-note" class="note-input" rows="3" ' +
          'placeholder="Notiz … (Mikrofon-Taste der Tastatur nutzbar)"></textarea>' +
        '</div>';

      // rewatch toggle
      const rewatchBtn = document.getElementById("pers-rewatch");
      const setRewatchUI = on => {
        rewatchBtn.classList.toggle("on", on);
        rewatchBtn.querySelector(".ep-check").innerHTML = on
          ? '<svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"/></svg>' : "";
      };
      setRewatchUI(meta.rewatch);
      rewatchBtn.addEventListener("click", () => {
        const cur = getMeta(key);
        cur.rewatch = !cur.rewatch;
        saveMeta(key, cur);
        setRewatchUI(cur.rewatch);
      });

      // nudity / sex self-flag
      const flagBtn = document.getElementById("pers-flag");
      const setFlagUI = on => {
        flagBtn.classList.toggle("on", on);
        flagBtn.querySelector(".ep-check").innerHTML = on
          ? '<svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"/></svg>' : "";
      };
      setFlagUI(meta.flagged);
      flagBtn.addEventListener("click", () => {
        const cur = getMeta(key);
        cur.flagged = !cur.flagged;
        saveMeta(key, cur);
        setFlagUI(cur.flagged);
      });

      // tags
      const tagsEl = document.getElementById("pers-tags");
      const tagInput = document.getElementById("pers-tag-input");
      function renderTags() {
        const cur = getMeta(key);
        tagsEl.innerHTML = "";
        cur.tags.forEach(tag => {
          const chip = document.createElement("span");
          chip.className = "tag-chip";
          const t = document.createElement("span"); t.textContent = tag;
          const x = document.createElement("button"); x.type = "button"; x.className = "tag-x"; x.setAttribute("aria-label", "Entfernen");
          x.innerHTML = '<svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
          x.addEventListener("click", () => {
            const c = getMeta(key);
            c.tags = c.tags.filter(g => g !== tag);
            saveMeta(key, c);
            renderTags();
          });
          chip.appendChild(t); chip.appendChild(x);
          tagsEl.appendChild(chip);
        });
      }
      renderTags();
      function addTag() {
        const val = tagInput.value.trim();
        if (!val) return;
        const cur = getMeta(key);
        if (!cur.tags.includes(val)) { cur.tags.push(val); saveMeta(key, cur); renderTags(); }
        tagInput.value = "";
      }
      tagInput.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); addTag(); } });
      tagInput.addEventListener("blur", addTag);

      // note (debounced auto-save)
      const noteEl = document.getElementById("pers-note");
      noteEl.value = meta.note;
      noteEl.addEventListener("input", () => {
        clearTimeout(personalNoteTimer);
        personalNoteTimer = setTimeout(() => {
          const cur = getMeta(key);
          cur.note = noteEl.value;
          saveMeta(key, cur);
        }, 500);
      });
    }

    // ====================================================================
    //  SERIES PROGRESS  (season / episode tracking)
    // ====================================================================
    const seasonCache = {}; // `${tvId}:${season}` -> episodes array

    function epKey(s, e) { return s + ":" + e; }
    function progressFor(tvId) { return db.progress[tvId] || null; }
    function ensureProgress(tvId) {
      if (!db.progress[tvId]) db.progress[tvId] = { eps: {} };
      return db.progress[tvId];
    }
    function isEpWatched(tvId, s, e) {
      const p = db.progress[tvId];
      return !!(p && p.eps[epKey(s, e)]);
    }
    function toggleEp(tvId, s, e, on) {
      const p = ensureProgress(tvId);
      const k = epKey(s, e);
      if (on) p.eps[k] = true; else delete p.eps[k];
      saveDB();
    }

    // seasons we count (skip specials = season 0)
    function realSeasons(data) {
      return (data.seasons || []).filter(s => s.season_number >= 1 && s.episode_count > 0);
    }
    function totalEpisodes(data) { return realSeasons(data).reduce((n, s) => n + s.episode_count, 0); }
    function watchedCount(tvId) {
      const p = db.progress[tvId];
      return p ? Object.keys(p.eps).length : 0;
    }
    function watchedInSeason(tvId, season) {
      const p = db.progress[tvId];
      if (!p) return 0;
      let n = 0;
      for (const k in p.eps) if (k.slice(0, k.indexOf(":")) === String(season)) n++;
      return n;
    }
    // last watched episode = highest (season, episode) that is marked
    function lastWatched(tvId) {
      const p = db.progress[tvId];
      if (!p) return null;
      let best = null;
      for (const k in p.eps) {
        const s = parseInt(k.slice(0, k.indexOf(":")), 10);
        const e = parseInt(k.slice(k.indexOf(":") + 1), 10);
        if (!best || s > best.s || (s === best.s && e > best.e)) best = { s, e };
      }
      return best;
    }

    function progressSummaryText(data, tvId) {
      const total = totalEpisodes(data);
      const watched = watchedCount(tvId);
      const last = lastWatched(tvId);
      if (!last) return "Noch nicht begonnen · 0/" + total + " Episoden";
      const season = realSeasons(data).find(s => s.season_number === last.s);
      const epsInSeason = season ? season.episode_count : "?";
      return "Bei S" + last.s + " E" + last.e + " von " + epsInSeason + " · " + watched + "/" + total + " Episoden";
    }

    let progSeason = 1; // currently expanded season

    function renderProgress(data) {
      const host = document.getElementById("detail-progress");
      if (!host) return;
      const tvId = keyOf("tv", data.id); // e.g. "tv:1396"
      const seasons = realSeasons(data);
      if (!seasons.length) { host.innerHTML = ""; return; }

      // default to the season of the last watched episode
      const last = lastWatched(tvId);
      progSeason = last ? last.s : seasons[0].season_number;
      if (!seasons.some(s => s.season_number === progSeason)) progSeason = seasons[0].season_number;

      host.innerHTML =
        '<div class="detail-section"><h3>Fortschritt</h3>' +
        '<div class="prog-summary" id="prog-summary"></div>' +
        '<div class="season-chips" id="prog-seasons"></div>' +
        '<div id="prog-eps" class="ep-list"></div></div>';

      updateProgSummary(data, tvId);

      const chipWrap = document.getElementById("prog-seasons");
      seasons.forEach(s => {
        const c = document.createElement("button");
        c.className = "chip prog-chip" + (s.season_number === progSeason ? " active" : "");
        c.type = "button";
        c.dataset.season = s.season_number;
        c.textContent = "S" + s.season_number;
        c.addEventListener("click", () => {
          progSeason = s.season_number;
          chipWrap.querySelectorAll(".prog-chip").forEach(x => x.classList.toggle("active", x === c));
          loadSeason(data, tvId, s.season_number);
        });
        chipWrap.appendChild(c);
      });

      loadSeason(data, tvId, progSeason);
    }

    function updateProgSummary(data, tvId) {
      const el = document.getElementById("prog-summary");
      if (el) el.textContent = progressSummaryText(data, tvId);
    }

    async function loadSeason(data, tvId, season) {
      const epsEl = document.getElementById("prog-eps");
      if (!epsEl) return;
      epsEl.innerHTML = '<div class="ep-loading">Lädt …</div>';
      const cacheKey = data.id + ":" + season;
      let episodes = seasonCache[cacheKey];
      if (!episodes) {
        try {
          const res = await fetch("https://api.themoviedb.org/3/tv/" + data.id + "/season/" + season
            + "?api_key=" + TMDB_KEY + "&language=" + TMDB_LANG);
          if (!res.ok) throw new Error();
          const d = await res.json();
          episodes = (d.episodes || []).map(e => ({ n: e.episode_number, name: e.name }));
          seasonCache[cacheKey] = episodes;
        } catch (e) { epsEl.innerHTML = '<div class="ep-loading">Konnte nicht laden.</div>'; return; }
      }
      // guard: user may have switched season while loading
      if (progSeason !== season) return;

      epsEl.innerHTML = "";
      // "whole season" toggle
      const allWatched = episodes.length > 0 && episodes.every(e => isEpWatched(tvId, season, e.n));
      const head = document.createElement("button");
      head.className = "ep-season-toggle";
      head.type = "button";
      head.textContent = allWatched ? "Ganze Staffel abwählen" : "Ganze Staffel als gesehen";
      head.addEventListener("click", () => {
        const target = !allWatched;
        episodes.forEach(e => toggleEp(tvId, season, e.n, target));
        updateProgSummary(data, tvId);
        loadSeason(data, tvId, season);
      });
      epsEl.appendChild(head);

      const frag = document.createDocumentFragment();
      episodes.forEach(e => {
        const row = document.createElement("button");
        row.className = "ep-row";
        row.type = "button";
        const on = isEpWatched(tvId, season, e.n);
        row.classList.toggle("done", on);

        const box = document.createElement("span");
        box.className = "ep-check";
        box.innerHTML = on ? '<svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"/></svg>' : "";

        const num = document.createElement("span"); num.className = "ep-num"; num.textContent = e.n;
        const nm  = document.createElement("span"); nm.className = "ep-name"; nm.textContent = e.name || ("Episode " + e.n);

        row.appendChild(box); row.appendChild(num); row.appendChild(nm);
        row.addEventListener("click", () => {
          const now = !isEpWatched(tvId, season, e.n);
          toggleEp(tvId, season, e.n, now);
          row.classList.toggle("done", now);
          box.innerHTML = now ? '<svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"/></svg>' : "";
          updateProgSummary(data, tvId);
          head.textContent = episodes.every(x => isEpWatched(tvId, season, x.n)) ? "Ganze Staffel abwählen" : "Ganze Staffel als gesehen";
        });
        frag.appendChild(row);
      });
      epsEl.appendChild(frag);
    }

    // ====================================================================
    //  LISTS  (Watchlist + custom lists) and the WÜRFEL (random picker)
    // ====================================================================
    const WATCHLIST_ID = "watchlist";

    // Unified accessors over the built-in watchlist and custom lists
    function listItemsMap(listId) {
      return listId === WATCHLIST_ID ? db.watchlist : (db.lists[listId] ? db.lists[listId].items : {});
    }
    function listName(listId) {
      return listId === WATCHLIST_ID ? "Watchlist" : (db.lists[listId] ? db.lists[listId].name : "");
    }
    function allLists() {
      const out = [{ id: WATCHLIST_ID, name: "Watchlist", items: db.watchlist, system: true }];
      for (const id in db.lists) out.push({ id, name: db.lists[id].name, items: db.lists[id].items, system: false });
      return out;
    }
    function membershipLabel(key) {
      if (db.watchlist[key]) return "Auf der Watchlist";
      const names = [];
      for (const id in db.lists) if (db.lists[id].items[key]) names.push(db.lists[id].name);
      if (names.length === 1) return "Auf: " + names[0];
      if (names.length > 1) return "Auf " + names.length + " Listen";
      return null;
    }
    function addToList(listId, r) {
      const key = keyOf(r.media_type, r.id);
      const map = listItemsMap(listId);
      if (map[key]) return false;
      map[key] = recordFrom(r, null);
      saveDB();
      return true;
    }
    function removeFromList(listId, key) {
      const map = listItemsMap(listId);
      if (map[key]) { delete map[key]; saveDB(); }
    }
    function createList(name) {
      db.listSeq = (db.listSeq || 0) + 1;
      const id = "list" + db.listSeq;
      db.lists[id] = { id, name, items: {} };
      saveDB();
      return id;
    }
    function deleteList(listId) {
      if (db.lists[listId]) { delete db.lists[listId]; saveDB(); }
    }

    // ---------- Lists overview ----------
    const listsOverview = document.getElementById("lists-overview");
    const listDetail    = document.getElementById("list-detail");
    const listsCards    = document.getElementById("lists-cards");

    function showListsOverview() {
      listDetail.hidden = true;
      listsOverview.hidden = false;
      renderListsCards();
    }

    function renderListsCards() {
      listsCards.innerHTML = "";
      const frag = document.createDocumentFragment();
      for (const list of allLists()) {
        const items = Object.values(list.items);
        const card = document.createElement("button");
        card.className = "list-card";
        card.type = "button";

        const thumbs = document.createElement("div");
        thumbs.className = "list-card-thumbs";
        const withPoster = items.filter(it => it.poster).slice(0, 2);
        if (withPoster.length === 0) {
          const e = document.createElement("div"); e.className = "lc-empty"; e.style.left = "0"; e.textContent = "leer";
          thumbs.appendChild(e);
        } else {
          withPoster.forEach((it, i) => {
            const img = document.createElement("img");
            img.loading = "lazy"; img.src = IMG_BASE + "w92" + it.poster; img.alt = "";
            img.style.left = (i * 20) + "px"; img.style.zIndex = String(2 - i);
            thumbs.appendChild(img);
          });
        }
        card.appendChild(thumbs);

        const bodyEl = document.createElement("div");
        bodyEl.className = "list-card-body";
        const nm = document.createElement("div"); nm.className = "list-card-name"; nm.textContent = list.name;
        const ct = document.createElement("div"); ct.className = "list-card-count";
        ct.textContent = items.length + (items.length === 1 ? " Titel" : " Titel");
        bodyEl.appendChild(nm); bodyEl.appendChild(ct);
        card.appendChild(bodyEl);

        const chev = document.createElement("div");
        chev.className = "list-card-chevron";
        chev.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>';
        card.appendChild(chev);

        card.addEventListener("click", () => openListDetail(list.id));
        frag.appendChild(card);
      }
      listsCards.appendChild(frag);
    }

    // ---------- List detail ----------
    let currentListId = null;
    let deleteArmed = false;

    function openListDetail(listId) {
      currentListId = listId;
      deleteArmed = false;
      listsOverview.hidden = true;
      listDetail.hidden = false;
      listDetail.scrollTop = 0;
      document.getElementById("list-detail-name").textContent = listName(listId);
      const delBtn = document.getElementById("delete-list");
      delBtn.hidden = (listId === WATCHLIST_ID);
      delBtn.textContent = "Liste löschen";
      renderListGrid();
    }

    function renderListGrid() {
      const grid = document.getElementById("list-detail-grid");
      const items = Object.values(listItemsMap(currentListId));
      document.getElementById("list-detail-count").textContent =
        items.length + (items.length === 1 ? " Titel" : " Titel");
      document.getElementById("open-wuerfel").disabled = items.length === 0;

      grid.innerHTML = "";
      if (items.length === 0) {
        const e = document.createElement("div");
        e.className = "grid-empty";
        e.textContent = "Noch nichts auf dieser Liste.";
        grid.appendChild(e);
        return;
      }
      const frag = document.createDocumentFragment();
      for (const it of items) {
        const key = keyOf(it.mediaType, it.id);
        const cell = document.createElement("div");
        cell.className = "grid-item";

        if (it.poster) {
          const img = document.createElement("img");
          img.loading = "lazy"; img.src = IMG_BASE + "w185" + it.poster; img.alt = it.title;
          cell.appendChild(img);
        } else {
          const ph = document.createElement("div"); ph.className = "gi-empty"; ph.textContent = it.title;
          cell.appendChild(ph);
        }

        const rm = document.createElement("button");
        rm.className = "grid-item-rm"; rm.type = "button"; rm.setAttribute("aria-label", "Entfernen");
        rm.innerHTML = '<svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
        rm.addEventListener("click", e => { e.stopPropagation(); removeFromList(currentListId, key); renderListGrid(); refreshResults(); });
        cell.appendChild(rm);

        cell.addEventListener("click", () => openDetail(it.mediaType, it.id));
        frag.appendChild(cell);
      }
      grid.appendChild(frag);
    }

    document.getElementById("list-back").addEventListener("click", showListsOverview);
    document.getElementById("delete-list").addEventListener("click", function () {
      if (!deleteArmed) { deleteArmed = true; this.textContent = "Wirklich löschen?"; return; }
      deleteList(currentListId);
      showToast("Liste gelöscht");
      showListsOverview();
    });
    document.getElementById("new-list-btn").addEventListener("click", () => openNewList("overview"));

    // ---------- List picker (add a title) ----------
    const pickerBackdrop = document.getElementById("picker-backdrop");
    const pickerLists    = document.getElementById("picker-lists");
    let pendingPickItem  = null;

    function openListPicker(r) {
      pendingPickItem = r;
      const key = keyOf(r.media_type, r.id);
      pickerLists.innerHTML = "";
      for (const list of allLists()) {
        const inList = !!list.items[key];
        const btn = document.createElement("button");
        btn.className = "picker-item" + (inList ? " done" : "");
        btn.type = "button";
        const nm = document.createElement("span"); nm.textContent = list.name;
        const ct = document.createElement("span"); ct.className = "picker-item-count";
        ct.textContent = inList ? "✓ drin" : (Object.keys(list.items).length + "");
        btn.appendChild(nm); btn.appendChild(ct);
        btn.addEventListener("click", () => {
          if (addToList(list.id, pendingPickItem)) showToast("Hinzugefügt zu " + list.name);
          else showToast("Schon auf " + list.name);
          closeListPicker();
          refreshResults();
          refreshDetailStatus();
        });
        pickerLists.appendChild(btn);
      }
      pickerBackdrop.hidden = false;
      document.body.style.overflow = "hidden";
    }
    function closeListPicker() {
      pickerBackdrop.hidden = true;
      document.body.style.overflow = "";
    }
    document.getElementById("picker-cancel").addEventListener("click", closeListPicker);
    pickerBackdrop.addEventListener("click", e => { if (e.target === pickerBackdrop) closeListPicker(); });
    document.getElementById("picker-newlist").addEventListener("click", () => { closeListPicker(); openNewList("pick"); });

    // ---------- New list modal ----------
    const newlistBackdrop = document.getElementById("newlist-backdrop");
    const newlistInput    = document.getElementById("newlist-input");
    let newlistMode = "overview"; // "overview" | "pick"

    function openNewList(mode) {
      newlistMode = mode;
      newlistInput.value = "";
      newlistBackdrop.hidden = false;
      document.body.style.overflow = "hidden";
      setTimeout(() => newlistInput.focus(), 60);
    }
    function closeNewList() {
      newlistBackdrop.hidden = true;
      document.body.style.overflow = "";
    }
    function submitNewList() {
      const name = newlistInput.value.trim();
      if (!name) { showToast("Bitte einen Namen eingeben"); return; }
      const id = createList(name);
      closeNewList();
      if (newlistMode === "pick" && pendingPickItem) {
        addToList(id, pendingPickItem);
        showToast("Hinzugefügt zu " + name);
        refreshResults();
        refreshDetailStatus();
      } else {
        openListDetail(id);
      }
    }
    document.getElementById("newlist-create").addEventListener("click", submitNewList);
    document.getElementById("newlist-cancel").addEventListener("click", closeNewList);
    newlistInput.addEventListener("keydown", e => { if (e.key === "Enter") submitNewList(); });
    newlistBackdrop.addEventListener("click", e => { if (e.target === newlistBackdrop) closeNewList(); });

    // ---------- Würfel (random picker with filters) ----------
    const wuerfelBackdrop = document.getElementById("wuerfel-backdrop");
    const wuerfelStatus   = document.getElementById("wuerfel-status");
    const wuerfelResult   = document.getElementById("wuerfel-result");
    let genreMapById = null;

    async function ensureGenres() {
      if (genreMapById) return genreMapById;
      genreMapById = {};
      for (const t of ["movie", "tv"]) {
        try {
          const res = await fetch("https://api.themoviedb.org/3/genre/" + t + "/list?api_key=" + TMDB_KEY + "&language=" + TMDB_LANG);
          if (res.ok) { const d = await res.json(); (d.genres || []).forEach(g => { genreMapById[g.id] = g.name; }); }
        } catch (e) { /* ignore */ }
      }
      return genreMapById;
    }

    async function enrichOne(rec) {
      if (rec.enriched) return;
      try {
        const res = await fetch("https://api.themoviedb.org/3/" + rec.mediaType + "/" + rec.id + "?api_key=" + TMDB_KEY + "&language=" + TMDB_LANG);
        if (res.ok) {
          const d = await res.json();
          rec.runtime = rec.mediaType === "tv"
            ? (Array.isArray(d.episode_run_time) && d.episode_run_time.length ? d.episode_run_time[0] : null)
            : (typeof d.runtime === "number" ? d.runtime : null);
          rec.genreIds = (d.genres || []).map(g => g.id);
          rec.rating = typeof d.vote_average === "number" ? d.vote_average : (rec.rating || 0);
          rec.enriched = true;
        }
      } catch (e) { /* ignore */ }
    }
    async function enrichItems(items) {
      const pending = items.filter(it => !it.enriched);
      if (!pending.length) return;
      let i = 0;
      const worker = async () => { while (i < pending.length) { await enrichOne(pending[i++]); } };
      await Promise.all([worker(), worker(), worker(), worker(), worker()]);
      saveDB();
    }

    function populateGenreOptions(items) {
      const sel = document.getElementById("f-genre");
      const names = new Set();
      items.forEach(it => (it.genreIds || []).forEach(id => { if (genreMapById && genreMapById[id]) names.add(genreMapById[id]); }));
      sel.innerHTML = '<option value="">Alle</option>';
      [...names].sort((a, b) => a.localeCompare(b)).forEach(n => {
        const o = document.createElement("option"); o.value = n; o.textContent = n; sel.appendChild(o);
      });
    }

    async function openWuerfel(listId) {
      currentListId = listId; // würfel always uses the open list
      wuerfelResult.hidden = true;
      wuerfelResult.innerHTML = "";
      document.getElementById("f-media").value = "all";
      document.getElementById("f-runtime").value = "0";
      document.getElementById("f-rating").value = "0";
      document.getElementById("f-genre").innerHTML = '<option value="">Alle</option>';
      document.getElementById("f-flag").value = "show";
      wuerfelBackdrop.hidden = false;
      document.body.style.overflow = "hidden";

      const items = Object.values(listItemsMap(listId));
      const needsPrep = items.some(it => !it.enriched);
      wuerfelStatus.textContent = needsPrep ? "Bereite Filter vor …" : "";
      document.getElementById("wuerfel-roll").disabled = true;
      await ensureGenres();
      await enrichItems(items);
      populateGenreOptions(items);
      wuerfelStatus.textContent = "";
      document.getElementById("wuerfel-roll").disabled = false;
    }
    function closeWuerfel() {
      wuerfelBackdrop.hidden = true;
      document.body.style.overflow = "";
      renderListGrid(); // runtimes etc. may now be cached
    }

    function filteredWuerfelItems() {
      const media = document.getElementById("f-media").value;
      const maxRt = parseInt(document.getElementById("f-runtime").value, 10) || 0;
      const minRt = parseFloat(document.getElementById("f-rating").value) || 0;
      const genre = document.getElementById("f-genre").value;
      const flagMode = document.getElementById("f-flag").value;
      return Object.values(listItemsMap(currentListId)).filter(it => {
        if (media !== "all" && it.mediaType !== media) return false;
        if (maxRt > 0) { if (it.runtime == null) return false; if (it.runtime > maxRt) return false; }
        if (minRt > 0 && (it.rating || 0) < minRt) return false;
        if (genre) {
          const names = (it.genreIds || []).map(id => genreMapById && genreMapById[id]).filter(Boolean);
          if (!names.includes(genre)) return false;
        }
        if (flagMode === "hide" && getMeta(keyOf(it.mediaType, it.id)).flagged) return false;
        return true;
      });
    }

    function rollWuerfel() {
      const pool = filteredWuerfelItems();
      if (!pool.length) {
        wuerfelResult.hidden = true;
        wuerfelStatus.textContent = "Kein Titel passt zu den Filtern.";
        return;
      }
      wuerfelStatus.textContent = pool.length + (pool.length === 1 ? " Treffer" : " Treffer");
      const it = pool[Math.floor(Math.random() * pool.length)];
      wuerfelResult.innerHTML = "";
      if (it.poster) {
        const img = document.createElement("img"); img.src = IMG_BASE + "w185" + it.poster; img.alt = "";
        wuerfelResult.appendChild(img);
      } else {
        const e = document.createElement("div"); e.className = "wr-empty"; e.textContent = "Kein Bild";
        wuerfelResult.appendChild(e);
      }
      const body = document.createElement("div"); body.className = "wr-body";
      const t = document.createElement("div"); t.className = "wr-title"; t.textContent = it.title;
      const sub = document.createElement("div"); sub.className = "wr-sub";
      const bits = [it.mediaType === "tv" ? "Serie" : "Film"];
      if (it.year) bits.push(it.year);
      if (it.runtime) bits.push(it.runtime + " Min.");
      if (it.rating) bits.push("TMDB " + it.rating.toFixed(1).replace(".", ","));
      sub.textContent = bits.join(" · ");
      const open = document.createElement("div"); open.className = "wr-open"; open.textContent = "Details ansehen →";
      body.appendChild(t); body.appendChild(sub); body.appendChild(open);
      wuerfelResult.appendChild(body);
      wuerfelResult.hidden = false;
      wuerfelResult.onclick = () => { closeWuerfel(); openDetail(it.mediaType, it.id); };
    }

    document.getElementById("open-wuerfel").addEventListener("click", () => openWuerfel(currentListId));
    document.getElementById("wuerfel-roll").addEventListener("click", rollWuerfel);
    document.getElementById("wuerfel-cancel").addEventListener("click", closeWuerfel);
    wuerfelBackdrop.addEventListener("click", e => { if (e.target === wuerfelBackdrop) closeWuerfel(); });

    // ====================================================================
    //  DISCOVER  (curated rows, genre browse, general search)
    // ====================================================================
    const discSearch     = document.getElementById("disc-search");
    const discClear      = document.getElementById("disc-clear");
    const discResults    = document.getElementById("disc-results");
    const discBrowse     = document.getElementById("disc-browse");
    const discGenreView  = document.getElementById("disc-genre-view");
    const discRows       = document.getElementById("disc-rows");
    const discGenreChips = document.getElementById("disc-genre-chips");

    const DISC_ROWS = [
      { title: "Diese Woche im Trend", url: "/trending/all/week", mixed: true },
      { title: "Jetzt im Kino",        url: "/movie/now_playing", region: true, media: "movie" },
      { title: "Demnächst",            url: "/movie/upcoming",    region: true, media: "movie" },
      { title: "Beliebt",              url: "/movie/popular",     media: "movie" },
      { title: "Bestbewertet",         url: "/movie/top_rated",   media: "movie" }
    ];

    let discInited = false;
    function initDiscover() {
      if (discInited) return;
      discInited = true;
      buildGenreChips();
      buildRows();
    }

    function discPosterCard(item, mediaType) {
      const card = document.createElement("div");
      card.className = "pcard";
      const title = mediaType === "tv" ? (item.name || item.original_name) : (item.title || item.original_title);
      const date  = mediaType === "tv" ? item.first_air_date : item.release_date;
      const year  = date ? date.slice(0, 4) : "";
      if (item.poster_path) {
        const img = document.createElement("img");
        img.loading = "lazy"; img.src = IMG_BASE + "w185" + item.poster_path; img.alt = title || "";
        card.appendChild(img);
      } else {
        const e = document.createElement("div"); e.className = "pc-empty"; e.textContent = title || "";
        card.appendChild(e);
      }
      const t = document.createElement("div"); t.className = "pcard-title"; t.textContent = title || "";
      const s = document.createElement("div"); s.className = "pcard-sub";
      s.textContent = (mediaType === "tv" ? "Serie" : "Film") + (year ? " · " + year : "");
      card.appendChild(t); card.appendChild(s);
      card.addEventListener("click", () => openDetail(mediaType, item.id));
      return card;
    }

    function buildRows() {
      discRows.innerHTML = "";
      for (const def of DISC_ROWS) {
        const wrap = document.createElement("div"); wrap.className = "drow";
        const h = document.createElement("div"); h.className = "drow-title"; h.textContent = def.title;
        const sc = document.createElement("div"); sc.className = "hscroll";
        sc.innerHTML = '<div class="drow-skeleton"><div class="sk"></div><div class="sk"></div><div class="sk"></div></div>';
        wrap.appendChild(h); wrap.appendChild(sc); discRows.appendChild(wrap);
        fillRow(def, sc);
      }
    }

    async function fillRow(def, sc) {
      try {
        let url = "https://api.themoviedb.org/3" + def.url + "?api_key=" + TMDB_KEY + "&language=" + TMDB_LANG;
        if (def.region) url += "&region=" + TMDB_REGION;
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        const d = await res.json();
        let items = (d.results || []);
        if (def.mixed) items = items.filter(it => it.media_type === "movie" || it.media_type === "tv");
        items = items.filter(it => it.poster_path).slice(0, 18);
        sc.innerHTML = "";
        if (!items.length) { sc.innerHTML = '<div class="disc-loading">—</div>'; return; }
        const frag = document.createDocumentFragment();
        items.forEach(it => frag.appendChild(discPosterCard(it, def.mixed ? it.media_type : def.media)));
        sc.appendChild(frag);
      } catch (e) {
        sc.innerHTML = '<div class="disc-loading">Konnte nicht laden.</div>';
      }
    }

    async function buildGenreChips() {
      try {
        const res = await fetch("https://api.themoviedb.org/3/genre/movie/list?api_key=" + TMDB_KEY + "&language=" + TMDB_LANG);
        if (!res.ok) return;
        const d = await res.json();
        const frag = document.createDocumentFragment();
        (d.genres || []).forEach(g => {
          const c = document.createElement("button");
          c.className = "chip"; c.type = "button"; c.textContent = g.name;
          c.addEventListener("click", () => openGenreBrowse(g.id, g.name));
          frag.appendChild(c);
        });
        discGenreChips.appendChild(frag);
      } catch (e) { /* ignore */ }
    }

    // ---------- Discover search ----------
    let discTimer = null, discAbort = null;

    function onDiscInput() {
      clearTimeout(discTimer);
      const q = discSearch.value.trim();
      discClear.hidden = q.length === 0;
      if (!q) { showDiscBrowse(); return; }
      discTimer = setTimeout(() => runDiscSearch(q), 280);
    }
    function showDiscBrowse() { discResults.hidden = true; discResults.innerHTML = ""; discGenreView.hidden = true; discBrowse.hidden = false; }
    function showDiscResults() { discBrowse.hidden = true; discGenreView.hidden = true; discResults.hidden = false; }

    async function runDiscSearch(q) {
      if (discAbort) discAbort.abort();
      discAbort = new AbortController();
      const url = "https://api.themoviedb.org/3/search/multi?api_key=" + TMDB_KEY + "&language=" + TMDB_LANG
        + "&include_adult=false&query=" + encodeURIComponent(q);
      try {
        const res = await fetch(url, { signal: discAbort.signal });
        if (!res.ok) throw new Error();
        const d = await res.json();
        if (discSearch.value.trim() !== q) return;
        const items = (d.results || []).filter(r => r.media_type === "movie" || r.media_type === "tv").slice(0, 30);
        renderDiscResults(items);
      } catch (e) {
        if (e.name === "AbortError") return;
        renderDiscResults("error");
      }
    }

    function renderDiscResults(items) {
      showDiscResults();
      discResults.innerHTML = "";
      if (items === "error") { discResults.innerHTML = '<div class="results-empty">Suche fehlgeschlagen. Internet prüfen?</div>'; return; }
      if (!items.length) { discResults.innerHTML = '<div class="results-empty">Nichts gefunden.</div>'; return; }
      const frag = document.createDocumentFragment();
      for (const r of items) frag.appendChild(buildResultRow(r, () => openDetail(r.media_type, r.id)));
      discResults.appendChild(frag);
    }

    discSearch.addEventListener("input", onDiscInput);
    discClear.addEventListener("click", () => { discSearch.value = ""; discClear.hidden = true; showDiscBrowse(); discSearch.focus(); });

    // ---------- Genre browse ----------
    const discGenreGrid = document.getElementById("disc-genre-grid");
    const discGenreMore = document.getElementById("disc-genre-more");
    const discGenreSort = document.getElementById("disc-genre-sort");
    let gb = { id: null, name: "", sort: "popularity.desc", page: 0, totalPages: 1 };

    function openGenreBrowse(id, name) {
      gb = { id, name, sort: discGenreSort.value, page: 0, totalPages: 1 };
      document.getElementById("disc-genre-name").textContent = name;
      discGenreGrid.innerHTML = "";
      discBrowse.hidden = true; discResults.hidden = true; discGenreView.hidden = false;
      discGenreView.scrollTop = 0;
      loadGenrePage();
    }

    async function loadGenrePage() {
      gb.page += 1;
      discGenreMore.hidden = true;
      if (gb.page === 1) discGenreGrid.innerHTML = '<div class="grid-empty">Lädt …</div>';
      try {
        let url = "https://api.themoviedb.org/3/discover/movie?api_key=" + TMDB_KEY + "&language=" + TMDB_LANG
          + "&with_genres=" + gb.id + "&sort_by=" + gb.sort + "&page=" + gb.page + "&include_adult=false";
        if (gb.sort === "vote_average.desc") url += "&vote_count.gte=200";
        if (gb.sort === "primary_release_date.desc") url += "&vote_count.gte=20";
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        const d = await res.json();
        gb.totalPages = Math.min(d.total_pages || 1, 500);
        if (gb.page === 1) discGenreGrid.innerHTML = "";
        const items = (d.results || []).filter(it => it.poster_path);
        if (gb.page === 1 && !items.length) { discGenreGrid.innerHTML = '<div class="grid-empty">Nichts gefunden.</div>'; return; }
        const frag = document.createDocumentFragment();
        items.forEach(it => {
          const cell = document.createElement("div"); cell.className = "grid-item";
          const img = document.createElement("img"); img.loading = "lazy"; img.src = IMG_BASE + "w185" + it.poster_path; img.alt = it.title || "";
          cell.appendChild(img);
          cell.addEventListener("click", () => openDetail("movie", it.id));
          frag.appendChild(cell);
        });
        discGenreGrid.appendChild(frag);
        discGenreMore.hidden = gb.page >= gb.totalPages;
      } catch (e) {
        if (gb.page === 1) discGenreGrid.innerHTML = '<div class="grid-empty">Konnte nicht laden.</div>';
      }
    }

    discGenreSort.addEventListener("change", () => { if (gb.id) openGenreBrowse(gb.id, gb.name); });
    discGenreMore.addEventListener("click", loadGenrePage);
    document.getElementById("disc-genre-back").addEventListener("click", showDiscBrowse);

    // ====================================================================
    //  PROFILE  (stats)
    // ====================================================================
    function episodesWatchedTotal() {
      let n = 0;
      for (const k in db.progress) n += Object.keys(db.progress[k].eps).length;
      return n;
    }
    function paintStats(movies, series, hours, eps) {
      const cards = [
        { n: movies, l: "Filme" },
        { n: series, l: "Serien" },
        { n: hours == null ? "…" : hours, l: "Stunden" },
        { n: eps, l: "Episoden" }
      ];
      document.getElementById("profile-stats").innerHTML = cards.map(c =>
        '<div class="stat-card"><div class="stat-num">' + c.n + '</div><div class="stat-label">' + c.l + "</div></div>"
      ).join("");
    }

    async function renderProfile() {
      const noteEl = document.getElementById("profile-note");
      const items = Object.values(db.items);
      const movies = items.filter(i => i.mediaType === "movie");
      const series = items.filter(i => i.mediaType === "tv");

      if (!items.length) {
        paintStats(0, 0, 0, 0);
        noteEl.textContent = "Noch nichts eingetragen — fang im Log-Tab an.";
        return;
      }

      const needPrep = items.some(i => !i.enriched);
      paintStats(movies.length, series.length, null, episodesWatchedTotal());
      noteEl.textContent = needPrep ? "Stunden werden berechnet …" : "";

      await enrichItems(items);

      let mins = 0;
      movies.forEach(m => { if (m.runtime) mins += m.runtime; });
      series.forEach(s => { const w = watchedCount(keyOf("tv", s.id)); if (s.runtime) mins += w * s.runtime; });
      paintStats(movies.length, series.length, Math.round(mins / 60), episodesWatchedTotal());
      noteEl.textContent = "Serien-Stunden zählen nur abgehakte Episoden.";
    }

    // One-time migration: give older records an Elo score from their bucket
    (function migrateScores() {
      let changed = false;
      for (const k in db.items) {
        if (typeof db.items[k].score !== "number") {
          db.items[k].score = (BUCKET_BASE[db.items[k].bucket] != null ? BUCKET_BASE[db.items[k].bucket] : 1400);
          changed = true;
        }
      }
      if (changed) saveDB();
    })();

    // Cursor ready on first paint
    searchInput.focus();

    window.REEL = { TMDB_KEY, TMDB_LANG, TMDB_REGION, db };
  </script>
</body>
</html>
